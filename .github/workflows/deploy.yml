name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "mobile/**"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build + push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build + push web
        uses: docker/build-push-action@v6
        with:
          context: ./mobile
          file: ./mobile/Dockerfile.web
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/web:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/web:latest
          build-args: |
            EXPO_PUBLIC_BACKEND_URL=https://${{ vars.API_DOMAIN }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,scripts/deploy.sh"
          target: "/opt/alcurry/"
          strip_components: 0

      - name: Pull + restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,GITHUB_REPO
          script: |
            set -euo pipefail
            cd /opt/alcurry
            # IMAGE_TAG + GITHUB_REPO get written into /opt/alcurry/.env by
            # the bootstrap script. Here we just bump the tag.
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build-and-push.outputs.tag }}/" .env || \
              echo "IMAGE_TAG=${{ needs.build-and-push.outputs.tag }}" >> .env
            chmod +x scripts/deploy.sh || true
            ./scripts/deploy.sh
