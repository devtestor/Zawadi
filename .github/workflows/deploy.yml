name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "mobile/**"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
      skip-tests:
        description: "Skip pre-deploy tests (use only for hotfixes)"
        required: false
        type: boolean
        default: false

concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  backend-test:
    name: Backend typecheck + tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-tests }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-bun-backend-${{ hashFiles('backend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-backend-
      - name: Install
        run: bun install --frozen-lockfile
      - name: Generate Prisma client (Postgres schema, matches prod image)
        run: cp prisma/schema.postgresql.prisma prisma/schema.prisma && bunx prisma generate
      - name: Typecheck
        run: bun run typecheck
      - name: Tests
        run: bun test

  mobile-test:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-tests }}
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-bun-mobile-${{ hashFiles('mobile/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-mobile-
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck

  build-and-push:
    name: Build + push images to GHCR
    runs-on: ubuntu-latest
    needs: [backend-test, mobile-test]
    if: |
      always() &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped') &&
      (needs.mobile-test.result  == 'success' || needs.mobile-test.result  == 'skipped')
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ inputs.tag || github.sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build + push web
        uses: docker/build-push-action@v6
        with:
          context: ./mobile
          file: ./mobile/Dockerfile.web
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/web:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/web:latest
          build-args: |
            EXPO_PUBLIC_BACKEND_URL=https://${{ vars.API_DOMAIN }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.WEB_DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,scripts/deploy.sh"
          target: "/opt/alcurry/"
          strip_components: 0

      - name: Pull + restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/alcurry
            # IMAGE_TAG + GITHUB_REPO get written into /opt/alcurry/.env by
            # the bootstrap script. Here we just bump the tag in-place.
            TAG="${{ needs.build-and-push.outputs.tag }}"
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${TAG}/" .env
            else
              echo "IMAGE_TAG=${TAG}" >> .env
            fi
            chmod +x scripts/deploy.sh || true
            ./scripts/deploy.sh

      - name: Smoke test API health
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "https://${{ vars.API_DOMAIN }}/health" >/dev/null; then
              echo "::notice::API healthy at https://${{ vars.API_DOMAIN }}/health"
              exit 0
            fi
            sleep 5
          done
          echo "::error::API did not become healthy within 60s"
          exit 1

  rollback-hint:
    name: Rollback hint on failure
    needs: [build-and-push, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Print rollback command
        run: |
          echo "::error::Deploy failed. To roll back, re-run this workflow"
          echo "::error::with 'tag' set to the previous green commit SHA."
