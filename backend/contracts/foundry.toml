[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
polygon_amoy   = "${POLYGON_AMOY_RPC_URL}"
polygon        = "${POLYGON_RPC_URL}"
base_sepolia   = "${BASE_SEPOLIA_RPC_URL}"
base           = "${BASE_RPC_URL}"
celo_alfajores = "${CELO_ALFAJORES_RPC_URL}"
celo           = "${CELO_RPC_URL}"
