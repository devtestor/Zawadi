services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zawadi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-zawadi}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zawadi} -d ${POSTGRES_DB:-zawadi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER:-zawadi}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-zawadi}?schema=public
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PESAPAL_CONSUMER_KEY: ${PESAPAL_CONSUMER_KEY:-}
      PESAPAL_CONSUMER_SECRET: ${PESAPAL_CONSUMER_SECRET:-}
      PESAPAL_BASE_URL: ${PESAPAL_BASE_URL:-https://pay.pesapal.com/v3}
      PESAPAL_CURRENCY: ${PESAPAL_CURRENCY:-RWF}
      PESAPAL_IPN_ID: ${PESAPAL_IPN_ID:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
